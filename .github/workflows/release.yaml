name: Build and Release
run-name: "### PITCHENGA RELEASE ${{ github.ref_name }} - ${{ github.event.head_commit.timestamp }} - ${{ github.sha }}"

on:
  push:
    tags:
      - '*'
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macOS
            runner: self-hosted
#            runner: macos-latest
#          - os: Windows
#            runner: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Apple Certificate (macOS)
        if: runner.os == 'macOS'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTS }}
          P12_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          KEYCHAIN_PASSWORD: 'temporary_password'
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          # Paranoia check: How many characters is our secret?
          echo "Base64 Secret Length: $(echo -n "$BUILD_CERTIFICATE_BASE64" | wc -c)"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Checksum check
          echo "MD5 Checksum: $(md5 -q $CERTIFICATE_PATH)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import and check output
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # Append the temporary keychain to the search list instead of replacing it.
          # This prevents persistent changes to the search list on self-hosted runners.
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | xargs)

          # Authorize codesign and productbuild to access the keys
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPITCHENGA_VERSION=${{ github.ref_name }}

      - name: Build Project
        run: cmake --build build --config Release

      - name: macOS Artifacts
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/Pitchenga_artefacts/Release
          
          cat <<EOF > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-executable-page-protection</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Sign individual bundles manually (Hardened Runtime applied only to Standalone host)
          codesign --force --deep --options runtime --timestamp --sign "Developer ID Application" --entitlements entitlements.plist --preserve-metadata=identifier Standalone/Pitchenga.app
          codesign --force --deep --timestamp --sign "Developer ID Application" --preserve-metadata=identifier AU/Pitchenga.component
          codesign --force --deep --timestamp --sign "Developer ID Application" --preserve-metadata=identifier VST3/Pitchenga.vst3

          # Return to root for packaging
          cd ../../../
          
          # Create the Installer PKG
          ./create-pkg.sh build/Pitchenga_artefacts/Release Pitchenga-unsigned.pkg "${{ github.ref_name }}"
          productsign --sign "Developer ID Installer" Pitchenga-unsigned.pkg Pitchenga-macOS-Installer.pkg
          rm Pitchenga-unsigned.pkg

          # Create the Portable DMG
          ./create-dmg.sh build/Pitchenga_artefacts/Release Pitchenga-macOS-Portable.dmg
          codesign --force --timestamp --sign "Developer ID Application" Pitchenga-macOS-Portable.dmg

          # Notarize both artifacts
          # Note: notarytool can accept multiple files, but for clarity and better logging, we submit them sequentially.
          xcrun notarytool submit Pitchenga-macOS-Installer.pkg --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun notarytool submit Pitchenga-macOS-Portable.dmg --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait

          # Staple everything
          xcrun stapler staple Pitchenga-macOS-Installer.pkg
          xcrun stapler staple Pitchenga-macOS-Portable.dmg
          
          # Also staple the individual bundles inside the artifacts folder (for MAS or local use)
          xcrun stapler staple build/Pitchenga_artefacts/Release/Standalone/Pitchenga.app
          xcrun stapler staple build/Pitchenga_artefacts/Release/AU/Pitchenga.component
          xcrun stapler staple build/Pitchenga_artefacts/Release/VST3/Pitchenga.vst3

          # Mac App Store (MAS) Build & Upload to TestFlight
          # Note: Plugins (AU/VST3) cannot be distributed via MAS.
          export MAC_APP_BUNDLE_ID="${{ secrets.MAC_APP_BUNDLE_ID }}"
          export MAC_APP_APPLE_ID="${{ secrets.MAC_APP_APPLE_ID }}"
          ./mas-testflight.sh "${{ github.ref_name }}"

      - name: Windows Artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          iscc /DMyAppVersion="${{ github.ref_name }}" /DMyBuildDir="build\Pitchenga_artefacts\Release" installer.iss
          Compress-Archive -Path build\Pitchenga_artefacts\Release\* -DestinationPath Pitchenga-Windows-Portable.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pitchenga-${{ runner.os }}
          path: Pitchenga*.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    #    runs-on: self-hosted
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Pitchenga*.*
        env:
          GITHUB_TOKEN: ${{ secrets.JULES_AUTOMATION_PAT }}

      - name: Cleanup Old Releases
        run: |
          echo "Fetching list of releases..."
          # Keep the 5 most recent releases (including the one just created)
          gh release list --limit 100 | cut -f 3 | tail -n +6 | while read -r tag; do
              # Match the pattern: major.minor.patch
              if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && [ "$tag" != "${{ github.ref_name }}" ]; then
                  echo "Deleting old release and tag: $tag"
                  gh release delete "$tag" --yes --cleanup-tag
              fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.JULES_AUTOMATION_PAT }}
