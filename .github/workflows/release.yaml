name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macOS
#            runner: self-hosted
            runner: macos-latest
          - os: Windows
            runner: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Apple Certificate (macOS)
        if: runner.os == 'macOS'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTS }}
          P12_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          KEYCHAIN_PASSWORD: 'temporary_password'
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: macOS Artifacts
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/Pitchenga_artefacts/Release
          
          cat <<EOF > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-executable-page-protection</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Sign the fully assembled bundles manually (Hardened Runtime applied only to Standalone host)
          codesign --force --deep --options runtime --timestamp --sign "Developer ID Application" --entitlements entitlements.plist --preserve-metadata=identifier Standalone/Pitchenga.app
          codesign --force --deep --timestamp --sign "Developer ID Application" --preserve-metadata=identifier AU/Pitchenga.component
          codesign --force --deep --timestamp --sign "Developer ID Application" --preserve-metadata=identifier VST3/Pitchenga.vst3

          # Return to root to run the PKG script
          cd ../../../
          VERSION=$(bash version.sh)
          ./create-pkg.sh build/Pitchenga_artefacts/Release Pitchenga-unsigned.pkg "$VERSION"
          
          # Sign the PKG container itself using the Installer certificate
          productsign --sign "Developer ID Installer" Pitchenga-unsigned.pkg pitchenga.pkg
          rm Pitchenga-unsigned.pkg
          
          # Submit the PKG to Apple for Notarization
          xcrun notarytool submit pitchenga.pkg --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait

          # Staple the approval ticket directly to the PKG
          xcrun stapler staple pitchenga.pkg

      - name: Windows Artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = bash version.sh
          iscc /DMyAppVersion="$VERSION" /DMyBuildDir="build\Pitchenga_artefacts\Release" installer.iss
          Compress-Archive -Path build\Pitchenga_artefacts\Release\* -DestinationPath pitchenga-windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pitchenga-${{ runner.os }}
          path: Pitchenga*.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
#    runs-on: self-hosted
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Pitchenga*.*
        env:
          GITHUB_TOKEN: ${{ secrets.JULES_AUTOMATION_PAT }}

      - name: Cleanup Previous Releases
        run: |
          echo "Fetching list of previous releases..."
          gh release list --limit 100 | cut -f 3 | while read -r tag; do
            if [ -n "$tag" ] && [ "$tag" != "${{ github.ref_name }}" ]; then
              echo "Deleting previous release and tag: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.JULES_AUTOMATION_PAT }}