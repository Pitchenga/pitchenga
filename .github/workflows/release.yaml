name: Build and Release

on:
  push:
    tags:
      - '*' # Triggers when you push a tag like v1.0.0
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        # Using macos-latest (M1/M2) and windows-latest
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Apple Certificate (macOS)
        if: runner.os == 'macOS'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTS }}
          P12_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          KEYCHAIN_PASSWORD: 'temporary_password'
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: macOS Artifacts
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/Pitchenga_artefacts/Release
          
          cat <<EOF > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-executable-page-protection</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          #  Sign the fully assembled bundles manually (Hardened Runtime and Timestamp are mandatory for Notarization)
          codesign --force --deep --options runtime --timestamp --sign "Developer ID Application" --entitlements entitlements.plist --preserve-metadata=identifier Standalone/Pitchenga.app
          codesign --force --deep --options runtime --timestamp --sign "Developer ID Application" --entitlements entitlements.plist --preserve-metadata=identifier AU/Pitchenga.component
          codesign --force --deep --options runtime --timestamp --sign "Developer ID Application" --entitlements entitlements.plist --preserve-metadata=identifier VST3/Pitchenga.vst3
          
          # Create a temporary zip for Apple's Notarization servers
          zip -ry ../../../notary-payload.zip ./*
          
          # Submit to Apple and wait for the result
          cd ../../..
          xcrun notarytool submit notary-payload.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          
          # Staple the approval tickets directly to the binaries
          cd build/Pitchenga_artefacts/Release
          xcrun stapler staple Standalone/Pitchenga.app
          xcrun stapler staple AU/Pitchenga.component
          xcrun stapler staple VST3/Pitchenga.vst3
          
          # Create the final distribution zip containing the stapled apps
          zip -ry ../../../Pitchenga-macOS.zip ./*

      - name: Windows Artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build\Pitchenga_artefacts\Release\* -DestinationPath Pitchenga-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pitchenga-${{ runner.os }}
          path: Pitchenga-*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Pitchenga-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.JULES_AUTOMATION_PAT }}