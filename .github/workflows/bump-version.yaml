name: Bump Version and Tag

on:
  pull_request:
    types: [closed]
    branches:
      - production

jobs:
  bump:
    name: Bump Version and Create Tag
    if: github.event.pull_request.merged == true
#    runs-on: ubuntu-latest
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so that pushing the new tag triggers the release.yaml workflow
          token: ${{ secrets.JULES_AUTOMATION_PAT }}
          fetch-depth: 0 # Fetch all history so merge works correctly

      - name: Generate Version
        id: gen_version
        run: |
          # Generate version based on version.sh
          VERSION=$(bash version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create and Push Tag
        run: |
          # Replace the project version line (compatible with both macOS and Linux)
          sed "s/project(Pitchenga VERSION .*)/project(Pitchenga VERSION ${{ env.VERSION }})/" CMakeLists.txt > CMakeLists.txt.tmp && mv CMakeLists.txt.tmp CMakeLists.txt

      - name: Commit and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Release ${{ env.VERSION }}"
          
          # Push the commit back to the production branch
          git push origin production
          
          # Create and push the tag to trigger release.yaml
          git tag "${{ env.VERSION }}"
          git push origin "${{ env.VERSION }}"

