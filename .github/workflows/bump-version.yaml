name: Bump Version
run-name: "Bump Version - ${{ github.event.head_commit.timestamp }}"

on:
  pull_request:
    types: [ closed ]
    branches:
      - production

jobs:
  bump:
    name: Bump Version and Create Tag
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so that pushing the new tag triggers the release.yaml workflow
          token: ${{ secrets.JULES_AUTOMATION_PAT }}
          fetch-depth: 0 # Fetch all history so merge works correctly

      - name: Generate Version
        id: gen_version
        run: |
          # Generate version based on version.sh
          VERSION=$(bash version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create and Push Tag
        run: |
          git tag "${{ env.VERSION }}"
          git push origin "${{ env.VERSION }}"
