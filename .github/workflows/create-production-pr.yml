name: Auto-Create PR from main to production
run-name: "Create production PR - ${{ github.event.head_commit.timestamp }}"
on:
    push:
        branches:
            - main

jobs:
    create-pr:
        if: "github.event.head_commit != null && !contains(github.event.head_commit.message, 'Merge pull request') && !contains(github.event.head_commit.message, 'Merge branch')"
        #runs-on: self-hosted
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Create Pull Request
                env:
                    GITHUB_TOKEN: ${{ secrets.JULES_AUTOMATION_PAT }}
                run: |
                    gh pr create --base production --head main --title "Pitchenga production ${{ github.event.head_commit.timestamp }}" --body "Automated PR from main to production." || echo "PR already exists or could not be created"
