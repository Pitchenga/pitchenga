name: Auto-Create PR from dev to production
on:
    push:
        branches:
            - dev

jobs:
    create-pr:
        if: "github.event.head_commit != null && !contains(github.event.head_commit.message, 'Merge pull request') && !contains(github.event.head_commit.message, 'Merge branch')"
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Get version
              id: get_version
              run: |
                VERSION=$(grep -m 1 "project(Pitchenga VERSION" CMakeLists.txt | sed 's/.*VERSION \(.*\))/\1/')
                echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Create Pull Request
              env:
                  GITHUB_TOKEN: ${{ secrets.JULES_AUTOMATION_PAT }}
              run: |
                  gh pr create --base production --head dev --title "Production ${{ steps.get_version.outputs.version }}" --body "Automated PR from dev to production." || echo "PR already exists or could not be created"
